services:
  - type: web
    name: ctrlmanage-backend
    env: docker
    dockerfilePath: ./Dockerfile
    region: frankfurt
    plan: free
    healthCheckPath: /api/health
    rootDirectory: .
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: PORT
        value: 3001
      - key: FRONTEND_URL
        value: https://ctrlmanage.vercel.app
      - key: REDIS_URL
        fromService:
          name: ctrlmanage-redis
          type: redis
          envVarKey: REDIS_URL

  - type: redis
    name: ctrlmanage-redis
    plan: free
    region: frankfurt